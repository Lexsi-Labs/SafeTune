site_name: SafeTune
site_description: SafeTune is a unified library for preserving and restoring safety in fine-tuned LLMs — harden, recover, unlearn, steer, interpret and evaluate behind one API.
site_url: https://lexsi-labs.github.io/SafeTune/
repo_url: https://github.com/Lexsi-Labs/SafeTune
repo_name: Lexsi-Labs/SafeTune
edit_uri: edit/main/docs/
copyright: >
  Copyright &copy; 2026 <a href="https://lexsi.ai" target="_blank" rel="noopener">Lexsi Labs</a>

theme:
  name: material
  custom_dir: overrides
  logo: assets/compass.svg
  favicon: assets/compass.svg
  font:
    text: Schibsted Grotesk
    code: IBM Plex Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.prune
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

extra_css:
  - assets/safetune.css

extra_javascript:
  - assets/safetune.js
  - javascripts/mathjax.js
  - javascripts/mathjax-tex-mml-chtml.js

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Lexsi-Labs/SafeTune
      name: SafeTune on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/safetune/
      name: SafeTune on PyPI
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/Lexsi_labs
      name: Lexsi Labs on X
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/lexsi-labs/
      name: Lexsi Labs on LinkedIn
    - icon: simple/huggingface
      link: https://huggingface.co/Lexsi
      name: Lexsi Labs on Hugging Face

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: false
            heading_level: 2
            show_root_heading: true
            show_symbol_type_heading: true
            docstring_style: google
            filters:
              - "!^_"

# Internal / working pages kept out of the published nav.
exclude_docs: |
  reference/LIBRARY_CHECKLIST.csv

